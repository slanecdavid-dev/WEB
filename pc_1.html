<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="web-title">Detail produktu | Počítače z Moravy</title>
    <link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/pocitacezmoravy/WEB/main/img/loga/logo.jpg">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --primary: #28a745;
            --dark: #2c3e50;
            --bg: #f4f7f9;
            --border: #eef0f2;
            --text-muted: #6c757d;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #333; }
        
        header { background: var(--dark); color: #fff; padding: 0.8rem 0; }
        .header-container { max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .logo a { display: flex; align-items: center; text-decoration: none; color: #fff; }
        .logo img { height: 45px; border-radius: 5px; margin-right: 12px; background: #fff; padding: 2px; }
        .logo h1 { font-size: 1rem; margin: 0; }

        /* PRODUKT HERO A GALERIE */
        .product-hero { 
            max-width: 1000px; 
            margin: 20px auto; 
            display: grid; 
            grid-template-columns: 380px 1fr; 
            gap: 30px; 
            padding: 0 20px; 
        }
        
        .main-img-wrap { 
            position: relative;
            background: #fff; border-radius: 12px; height: 300px; 
            display: flex; align-items: center; justify-content: center; 
            overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow);
        }
        .main-img-wrap img#main-view { 
            max-width: 90%; max-height: 90%; object-fit: contain; cursor: zoom-in;
        }

        /* Šipky v hlavním náhledu */
        .nav-arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.9);
            color: var(--dark);
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            opacity: 0;
            transition: 0.3s;
            z-index: 10;
            border: 1px solid var(--border);
        }
        .main-img-wrap:hover .nav-arrow { opacity: 1; }
        .nav-arrow:hover { background: var(--primary); color: white; }
        .nav-prev { left: 10px; }
        .nav-next { right: 10px; }

        /* GALERIE BEZ POSUVNÍKU S MOŽNOSTÍ POSUVU */
        .thumb-gallery { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
            overflow-x: auto; 
            padding-bottom: 5px;
            cursor: grab; /* Naznačí, že lze táhnout */
            user-select: none;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* IE/Edge */
        }
        .thumb-gallery:active { cursor: grabbing; }
        .thumb-gallery::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .thumb-item { width: 65px; height: 65px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; background: #fff; flex-shrink: 0; padding: 2px; opacity: 0.7; pointer-events: auto; }
        .thumb-item.active { border-color: var(--primary); opacity: 1; }
        .thumb-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; pointer-events: none; }

        /* OSTATNÍ STYLY */
        .product-info { display: flex; flex-direction: column; justify-content: center; }
        h1.title { font-size: 1.6rem; margin: 0 0 10px 0; color: var(--dark); }
        .perex { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px; }
        .buy-card { background: #fff; padding: 25px; border-radius: 12px; border: 1px solid var(--border); box-shadow: var(--shadow); }
        .sklad-badge { display: inline-block; padding: 4px 12px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; }
        .price-tag { display: block; font-size: 1.8rem; font-weight: 800; color: var(--dark); margin-bottom: 15px; }
        .btn-buy { width: 100%; background: var(--primary); color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        
        .sticky-menu-wrapper { position: sticky; top: 0; z-index: 1000; background: #fff; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .content-nav { max-width: 1000px; margin: 0 auto; display: flex; }
        .content-nav a { flex: 1; text-align: center; text-decoration: none; color: var(--primary); font-size: 0.9rem; font-weight: 600; padding: 18px 5px; border-bottom: 4px solid transparent; }
        .content-nav a.active { background: #f0fdf4; color: #1e7e34; border-bottom: 4px solid var(--primary); }

        .content-sections { max-width: 1000px; margin: 10px auto 50px auto; padding: 0 20px; }
        .section { background: #fff; padding: 35px; border-radius: 15px; border: 1px solid var(--border); box-shadow: var(--shadow); margin-bottom: 30px; scroll-margin-top: 100px; }
        .section h2 { margin-top: 0; font-size: 1.3rem; margin-bottom: 20px; color: var(--dark); border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        
        .specs-table { width: 100%; border-collapse: collapse; }
        .specs-table td { padding: 12px; border-bottom: 1px solid #f8f9fa; }
        .specs-table td:first-child { color: var(--text-muted); font-weight: 600; width: 40%; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; }
        .photo-grid img { width: 100%; height: 160px; object-fit: cover; border-radius: 10px; cursor: zoom-in; border: 1px solid var(--border); }

        #img-modal { display: none; position: fixed; z-index: 9999; inset: 0; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        #modal-img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .close-modal { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; cursor: pointer; }
        .modal-arrow { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 50px; cursor: pointer; padding: 20px; z-index: 10001; }
        .arrow-left { left: 10px; } .arrow-right { right: 10px; }

        @media (max-width: 850px) {
            .product-hero { grid-template-columns: 1fr; }
            .nav-arrow { opacity: 1; }
        }
    </style>
</head>
<body>

<header>
    <div class="header-container">
        <div class="logo"><a href="index.html"><img id="db-logo" src="" alt="Logo"><h1>Počítače z Moravy</h1></a></div>
        <nav><a href="produkty.html" style="color:white; text-decoration:none; font-size: 0.8rem;">Všechny PC</a></nav>
    </div>
</header>

<main>
    <div class="product-hero">
        <div class="gallery-column">
            <div class="main-img-wrap">
                <div class="nav-arrow nav-prev" onclick="prevPhoto(event)">&#10094;</div>
                <img id="main-view" src="" alt="Produkt" onclick="openModal()">
                <div class="nav-arrow nav-next" onclick="nextPhoto(event)">&#10095;</div>
            </div>
            <div class="thumb-gallery" id="thumb-list"></div>
        </div>

        <div class="product-info">
            <h1 class="title" id="pc-title">---</h1>
            <p id="pc-perex" class="perex">---</p>
            <div class="buy-card">
                <div id="sklad-badge" class="sklad-badge">Načítání...</div>
                <span class="price-tag"><span id="pc-price">0</span> Kč</span>
                <button class="btn-buy" onclick="alert('Přidáno do košíku!')">Do košíku 🛒</button>
            </div>
        </div>
    </div>

    <div class="sticky-menu-wrapper">
        <div class="content-nav" id="main-nav">
            <a href="#popis" class="nav-link">Popis</a>
            <a href="#parametry" class="nav-link">Parametry</a>
            <a href="#fotky" class="nav-link">Fotogalerie</a>
            <a href="#benchmark" class="nav-link">Benchmark</a>
        </div>
    </div>

    <div class="content-sections">
        <div id="popis" class="section">
            <h2>Popis produktu</h2>
            <div id="pc-description" style="white-space: pre-line;">Načítání...</div>
        </div>
        <div id="parametry" class="section">
            <h2>Specifikace</h2>
            <table class="specs-table">
                <tr><td>Procesor</td><td id="spec-cpu">--</td></tr>
                <tr><td>Grafika</td><td id="spec-gpu">--</td></tr>
                <tr><td>RAM</td><td id="spec-ram">--</td></tr>
                <tr><td>SSD</td><td id="spec-d1">--</td></tr>
                <tr><td>Záruka</td><td id="spec-gar">--</td></tr>
            </table>
        </div>
        <div id="fotky" class="section">
            <h2>Galerie</h2>
            <div class="photo-grid" id="full-gallery"></div>
        </div>
        <div id="benchmark" class="section">
            <h2>Herní výkon</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
                <div style="background:var(--bg); padding:15px; border-radius:12px; text-align:center;">CS 2<br><b id="fps-cs">--</b></div>
                <div style="background:var(--bg); padding:15px; border-radius:12px; text-align:center;">Fortnite<br><b id="fps-fn">--</b></div>
                <div style="background:var(--bg); padding:15px; border-radius:12px; text-align:center;">Roblox<br><b id="fps-rx">--</b></div>
            </div>
        </div>
    </div>
</main>

<div id="img-modal">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <span class="modal-arrow arrow-left" onclick="prevPhoto(event)">&#10094;</span>
    <img id="modal-img" onclick="event.stopPropagation()">
    <span class="modal-arrow arrow-right" onclick="nextPhoto(event)">&#10095;</span>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyB0AsPToca13UPI9BzR_5nj5scqZwnhOxo",
        authDomain: "pc-store-5656d.firebaseapp.com",
        databaseURL: "https://pc-store-5656d-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "pc-store-5656d",
        storageBucket: "pc-store-5656d.firebasestorage.app",
        messagingSenderId: "329194547414",
        appId: "1:329194547414:web:14cf1cffd85a0279d54177"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const productID = urlParams.get('id') || 'pc_1';
    
    let photoList = [];
    let currentPhotoIdx = 0;

    function fixUrl(url) { return url ? url.replace("github.com", "raw.githubusercontent.com").replace("/blob/", "/") : ""; }

    db.ref('produkty').on('value', (snap) => {
        const data = snap.val();
        const pc = data[productID];
        if(!pc) return;

        document.getElementById('db-logo').src = fixUrl(data.logo);
        document.getElementById('pc-title').innerText = pc.nazev;
        document.getElementById('pc-description').innerText = pc.popis_podrobne || pc.popis;
        document.getElementById('pc-price').innerText = (pc.cena || 0).toLocaleString('cs-CZ');
        document.getElementById('pc-perex').innerText = pc.popis_strucne || "";

        const badge = document.getElementById('sklad-badge');
        badge.innerText = pc.sklad > 0 ? `Skladem ${pc.sklad} ks` : "Vyprodáno";
        badge.style.background = pc.sklad > 0 ? "#e8f5e9" : "#ffebee";
        badge.style.color = pc.sklad > 0 ? "#2e7d32" : "#c62828";

        document.getElementById('spec-cpu').innerText = pc.procesor;
        document.getElementById('spec-gpu').innerText = pc.grafika;
        document.getElementById('spec-ram').innerText = pc.ram;
        document.getElementById('spec-d1').innerText = pc.disk_1;
        document.getElementById('spec-gar').innerText = (pc.zaruka || 24) + " měsíců";
        document.getElementById('fps-cs').innerText = (pc.fps_cs || "0") + " FPS";
        document.getElementById('fps-fn').innerText = (pc.fps_fn || "0") + " FPS";
        document.getElementById('fps-rx').innerText = (pc.fps_rx || "0") + " FPS";

        photoList = [];
        const tWrap = document.getElementById('thumb-list');
        const gWrap = document.getElementById('full-gallery');
        tWrap.innerHTML = ""; gWrap.innerHTML = "";

        for(let i=1; i<=10; i++) {
            if(pc["foto_"+i]) {
                let url = fixUrl(pc["foto_"+i]);
                let idx = photoList.length;
                photoList.push(url);

                let thumb = document.createElement('div');
                thumb.className = "thumb-item";
                thumb.innerHTML = `<img src="${url}">`;
                thumb.onclick = () => selectPhoto(idx);
                tWrap.appendChild(thumb);

                let imgG = document.createElement('img');
                imgG.src = url;
                imgG.onclick = () => { selectPhoto(idx); openModal(); };
                gWrap.appendChild(imgG);
            }
        }
        if(photoList.length > 0) selectPhoto(0);
        initDragScroll(); // Re-inicializace po načtení fotek
    });

    function selectPhoto(idx) {
        currentPhotoIdx = idx;
        document.getElementById('main-view').src = photoList[idx];
        document.getElementById('modal-img').src = photoList[idx];
        const thumbs = document.querySelectorAll('.thumb-item');
        thumbs.forEach((t, i) => t.classList.toggle('active', i === idx));
    }

    // --- FUNKCE PRO POSUV MYŠÍ (Drag-to-Scroll) ---
    function initDragScroll() {
        const slider = document.getElementById('thumb-list');
        let isDown = false;
        let startX;
        let scrollLeft;

        slider.addEventListener('mousedown', (e) => {
            isDown = true;
            startX = e.pageX - slider.offsetLeft;
            scrollLeft = slider.scrollLeft;
        });
        slider.addEventListener('mouseleave', () => { isDown = false; });
        slider.addEventListener('mouseup', () => { isDown = false; });
        slider.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - slider.offsetLeft;
            const walk = (x - startX) * 2; // Rychlost posuvu
            slider.scrollLeft = scrollLeft - walk;
        });
    }

    function openModal() { document.getElementById('img-modal').style.display = 'flex'; document.body.style.overflow = 'hidden'; }
    function closeModal() { document.getElementById('img-modal').style.display = 'none'; document.body.style.overflow = 'auto'; }
    function nextPhoto(e) { if(e) e.stopPropagation(); currentPhotoIdx = (currentPhotoIdx + 1) % photoList.length; selectPhoto(currentPhotoIdx); }
    function prevPhoto(e) { if(e) e.stopPropagation(); currentPhotoIdx = (currentPhotoIdx - 1 + photoList.length) % photoList.length; selectPhoto(currentPhotoIdx); }

    window.addEventListener('keydown', (e) => {
        if (e.key === "ArrowRight") nextPhoto();
        if (e.key === "ArrowLeft") prevPhoto();
        if (e.key === "Escape") closeModal();
    });

    document.getElementById('img-modal').onclick = function(e) { if(e.target === this) closeModal(); };

    window.addEventListener('scroll', () => {
        let current = "";
        const sections = document.querySelectorAll('.section');
        sections.forEach(section => {
            if (window.pageYOffset >= section.offsetTop - 150) current = section.getAttribute('id');
        });
        const navLinks = document.querySelectorAll('.nav-link');
        navLinks.forEach(link => {
            link.classList.remove('active');
            if (link.getAttribute('href').includes(current)) link.classList.add('active');
        });
    });
</script>

</body>
</html>
